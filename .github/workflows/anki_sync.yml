name: Generate Anki Deck
on:
  push:
    branches: [ main ]
    paths:
      - 'Vocabulary/**' # 只有單字庫更新時才運行，節省資源

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install genanki

    - name: Run script
      run: python scripts/gen_anki.py

    # 自動更新一個名為 "latest" 的 Release (推薦)
    - name: Update Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: language_notes.apkg
        tag_name: latest
        name: Latest Anki Deck
        body: "Last updated on ${{ github.event.head_commit.timestamp }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}